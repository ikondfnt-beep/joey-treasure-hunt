<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treasure Hunt Portal</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/images/icon-192.png">

    <link rel="stylesheet" href="/style.css?v=2">
    <style>
        .patrol-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .btn-patrol { font-size: 24px; font-weight: 700; padding: 40px 16px; border: 1px solid var(--border-color); border-radius: 8px; background: white; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-patrol:active { background: #cbd5e1; transform: scale(0.98); }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid var(--border-color); padding-bottom: 12px; }
        .patrol-title { border: none; padding: 0; margin: 0; text-align: left; text-transform: uppercase; letter-spacing: 0.05em; font-size: 22px; }
        
        .clue-box { background: var(--bg-light); padding: 24px; border-radius: 6px; margin-bottom: 30px; font-size: 22px; line-height: 1.5; border: 1px solid var(--border-color); }
        .code-display-wrapper { margin: 0 auto 20px auto; max-width: 300px; }
        .code-display { font-size: 36px; font-weight: 700; letter-spacing: 12px; width: 100%; padding: 12px; text-align: center; border: 2px solid var(--scout-indigo); border-radius: 8px; background: #ffffff; color: var(--scout-indigo); box-sizing: border-box; caret-color: transparent; }
        
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 300px; margin: 0 auto; }
        .key { background: #e2e8f0; border: none; border-radius: 8px; font-size: 28px; font-weight: 700; padding: 18px 0; color: var(--scout-indigo); display: flex; align-items: center; justify-content: center; }
        .key:active { background: var(--scout-indigo); color: white; }
        .key.clear-key { background: #cbd5e1; font-size: 16px; text-transform: uppercase; }
        .key.submit-key { background: var(--scout-orange); color: white; font-size: 16px; text-transform: uppercase; }
        
        .error-banner { color: #ef4444; font-weight: 700; margin-top: 12px; font-size: 16px; min-height: 24px; text-align: center; }
        video { width: 100%; border-radius: 6px; margin-top: 12px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<!-- RESTORED HEADER REMOVED CLICK HANDLER FOR SCOUT VISIBILITY -->
<nav class="global-nav" style="display: flex; justify-content: center; padding: 16px; border-bottom: 1px solid var(--border-color); background: var(--bg-light);">
    <div class="nav-brand" style="font-weight: bold; font-size: 18px;">
        ⚜️ Treasure Hunt Portal
    </div>
</nav>

<h1>TREASURE HUNT INTERFACE</h1>
<h3>Tap your patrol name to enter your quest:</h3>
<div id="main-card" class="container">
    
    <div id="patrol-selection"> 
        <div id="patrol-buttons-container" class="patrol-grid">Loading active treasure hunt tracks...</div>
    </div>

    <div id="hunt-interface" class="hidden">
        <div class="header-row">
            <h2 id="active-patrol-name" class="patrol-title"></h2>
            <button class="btn-back-distinct" onclick="goBack()">⬅ Change Patrol</button>
        </div>
        
        <div class="clue-box">
            <div id="clue-text">Loading adventure instructions...</div>
        </div>

        <div id="input-zone">
            <div id="dynamic-input-container"></div>
            <div id="error-msg" class="error-banner"></div>
        </div>
    </div>
</div>

<!-- 🟢 ADDED: SUBTLE PORTAL FOOTER (Displays at the absolute bottom of mobile screens) -->
<div class="mobile-footer-portal" onclick="triggerSecretAdmin()">
    <div class="waffle-icon">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>
</div>

<script>
    let currentPatrol = "";
    // 🟢 ADDED: Track the server's current selected game profile index variable globally
    let currentTargetGameId = "default-hunt"; 
    const mainCard = document.getElementById('main-card');

    // 🟢 ADDED: Fetch the active tracking runtime value from the server mapping configuration
    function loadActiveGame() {
        fetch('/api/admin/games')
            .then(res => res.json())
            .then(data => {
                if (data && data.active_game) {
                    currentTargetGameId = data.active_game;
                    console.log("Interface synchronized to workspace profile ID:", currentTargetGameId);
                }
            })
            .catch(err => console.error("Error linking backend track indexes:", err));
    }

    function loadPatrolButtons() {
        fetch('/api/patrols')
            .then(res => res.json())
            .then(patrols => {
                const container = document.getElementById('patrol-buttons-container');
                if (patrols.length === 0) {
                    container.innerHTML = "<p style='grid-column:1/3; text-align:center;'>No active patrols set up yet. Go to the admin page to add some teams!</p>";
                    return;
                }
                container.innerHTML = patrols.map(p => `
                    <button class="btn-patrol" style="border-bottom: 5px solid ${p.patrol_color};" onclick="selectPatrol('${escapeJs(p.patrol_name)}', '${p.patrol_color}')">${escapeHtml(p.patrol_name)}</button>
                `).join('');
            });
    }

    function selectPatrol(patrol, color) {
        currentPatrol = patrol;
        mainCard.style.borderTop = `6px solid ${color}`;
        document.getElementById('patrol-selection').classList.add('hidden');
        document.getElementById('hunt-interface').classList.remove('hidden');
        document.getElementById('active-patrol-name').innerText = patrol + " Patrol Dashboard";
        clearCode();
        fetchClue();
    }

    function goBack() {
        mainCard.style.borderTop = "1px solid var(--border-color)";
        document.getElementById('patrol-selection').classList.remove('hidden');
        document.getElementById('hunt-interface').classList.add('hidden');
        loadPatrolButtons();
    }

    function fetchClue() {
        fetch(`/api/clue/${encodeURIComponent(currentPatrol)}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('clue-text').innerHTML = data.clue;
                
                if (data.isFinished) {
                    document.getElementById('input-zone').classList.add('hidden');
                    return;
                }
                
                document.getElementById('input-zone').classList.remove('hidden');
                renderSmartInput(data.inputType || 'number'); 
            });
    }

    function renderSmartInput(type) {
        const container = document.getElementById('dynamic-input-container');
        
        if (type === 'text') {
            container.innerHTML = `
                <div class="code-display-wrapper" style="max-width: 100%;">
                    <input type="text" id="code-display" class="code-display" style="caret-color: auto; letter-spacing: normal;" placeholder="Type the secret answer here...">
                </div>
                <div style="text-align:center; margin-top:10px;">
                    <button class="btn-primary" style="padding: 14px 40px; font-size:16px;" onclick="submitCode()">Submit Secret Word</button>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="code-display-wrapper">
                    <input type="text" id="code-display" class="code-display" readonly placeholder="----">
                </div>
                <div class="keypad-grid">
                    <button class="key" onclick="pressNum('1')">1</button>
                    <button class="key" onclick="pressNum('2')">2</button>
                    <button class="key" onclick="pressNum('3')">3</button>
                    <button class="key" onclick="pressNum('4')">4</button>
                    <button class="key" onclick="pressNum('5')">5</button>
                    <button class="key" onclick="pressNum('6')">6</button>
                    <button class="key" onclick="pressNum('7')">7</button>
                    <button class="key" onclick="pressNum('8')">8</button>
                    <button class="key" onclick="pressNum('9')">9</button>
                    <button class="key action-key clear-key" onclick="clearCode()">Clear</button>
                    <button class="key" onclick="pressNum('0')">0</button>
                    <button class="key action-key submit-key" onclick="submitCode()">Enter</button>
                </div>
            `;
        }
    }

    function pressNum(num) {
        const display = document.getElementById('code-display');
        document.getElementById('error-msg').innerText = "";
        if (display && display.value.length < 4) display.value += num;
    }

    function clearCode() { 
        const display = document.getElementById('code-display');
        if (display) display.value = ""; 
        document.getElementById('error-msg').innerText = ""; 
    }

    function submitCode() {
        const display = document.getElementById('code-display');
        if (!display || display.value.length === 0) return;
        
        fetch('/api/submit-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patrol: currentPatrol, code: display.value })
        })
        .then(res => res.json())
        .then(data => {
            if (data.correct) {
                fetchClue();
            } else {
                const errorBanner = document.getElementById('error-msg');
                errorBanner.innerText = data.message || "That answer doesn't match this location. Look closer!";
                display.style.borderColor = "#ef4444";
                setTimeout(() => { display.style.borderColor = "var(--scout-indigo)"; }, 600);
            }
        });
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function escapeJs(text) {
        return text.replace(/'/g, "\\'");
    }

    // 🟢 INITIALIZE ACTIVE WORKSPACE AND PATROLS TOGETHER
    loadActiveGame();
    loadPatrolButtons();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker Registered Successfully! ✅'))
        .catch(err => console.log('Service worker registration failed: ', err));
    });
  }

async function triggerSecretAdmin() {
    const accessCode = prompt("Enter administrative command code:");
    if (!accessCode) return; 

    try {
        const response = await fetch('/api/auth-admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gameId: currentTargetGameId, password: accessCode })
        });
        
        const data = await response.json();
        
        if (response.ok && data.authenticated) {
            window.location.href = `/admin?game=${currentTargetGameId}`;
        } else {
            alert(data.message || "Access Denied. Quest monitoring active.");
        }
    } catch (err) {
        console.error("Auth pipeline connection failure:", err);
        alert("System communication fault. Try again.");
    }
}
</script>

</body>
</html>

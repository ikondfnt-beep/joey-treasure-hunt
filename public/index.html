<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joey Scout Treasure Hunt</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; text-align: center; background-color: #f0fdf4; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2E295E; } /* Scout Indigo */
        button { font-size: 18px; padding: 12px 24px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-patrol { background-color: #B34D00; color: white; } /* Scout Burnt Orange */
        .btn-submit { background-color: #2E295E; color: white; width: 100%; margin-top: 15px; }
        input { font-size: 24px; width: 80%; padding: 10px; text-align: center; letter-spacing: 5px; border: 3px solid #ccc; border-radius: 8px; }
        .clue-box { background: #e0f2fe; padding: 20px; border-radius: 10px; margin-top: 20px; font-size: 20px; border-left: 5px solid #0284c7; }
        .error { color: red; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚜️ Joey Treasure Hunt ⚜️</h1>
    
    <div id="patrol-selection">
        <h3>Pick Your Patrol:</h3>
        <button class="btn-patrol" onclick="selectPatrol('Bilby')">Bilby</button>
        <button class="btn-patrol" onclick="selectPatrol('Wombat')">Wombat</button>
        <button class="btn-patrol" onclick="selectPatrol('Possum')">Possum</button>
        <button class="btn-patrol" onclick="selectPatrol('Kookaburra')">Kookaburra</button>
    </div>

    <div id="hunt-interface" class="hidden">
        <h2 id="active-patrol-name"></h2>
        <button onclick="goBack()" style="background:#ccc; font-size:12px; padding:5px 10px;">Change Patrol</button>
        
        <div class="clue-box">
            <strong>Current Clue:</strong>
            <p id="clue-text">Loading...</p>
        </div>

        <div id="input-zone" class="margin-top: 20px;">
            <h3>Found a code? Enter it here:</h3>
            <input type="number" id="code-input" pattern="\d*" placeholder="0000" inputmode="numeric">
            <button class="btn-submit" onclick="submitCode()">Unlock Next Clue 🔓</button>
            <p id="error-msg" class="error"></p>
        </div>
    </div>
</div>

<script>
    let currentPatrol = "";

    function selectPatrol(patrol) {
        currentPatrol = patrol;
        document.getElementById('patrol-selection').classList.add('hidden');
        document.getElementById('hunt-interface').classList.remove('hidden');
        document.getElementById('active-patrol-name').innerText = patrol + " Patrol";
        fetchClue();
    }

    function goBack() {
        document.getElementById('patrol-selection').classList.remove('hidden');
        document.getElementById('hunt-interface').classList.add('hidden');
    }

    function fetchClue() {
        fetch(`/api/clue/${currentPatrol}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('clue-text').innerHTML = data.clue;
                if (data.isFinished) {
                    document.getElementById('input-zone').classList.add('hidden');
                } else {
                    document.getElementById('input-zone').classList.remove('hidden');
                }
            });
    }

    function submitCode() {
        const codeInput = document.getElementById('code-input');
        const errorMsg = document.getElementById('error-msg');
        
        fetch('/api/submit-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patrol: currentPatrol, code: codeInput.value })
        })
        .then(res => res.json())
        .then(data => {
            if (data.correct) {
                errorMsg.innerText = "";
                codeInput.value = "";
                fetchClue(); // Refresh screen with the new clue
            } else {
                errorMsg.innerText = data.message || "That's not quite right. Try again!";
            }
        });
    }
</script>
</body>
</html>

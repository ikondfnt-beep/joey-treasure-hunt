<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joey Scout Adventure Hub</title>
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .patrol-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .btn-patrol { font-size: 28px; font-weight: 800; padding: 50px 20px; border: 4px solid; border-radius: 24px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .patrol-title { border: none; padding: 0; margin: 0; text-align: left; }
        
        .btn-back { background: #f1f5f9; color: #64748b; border: none; padding: 12px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; }
        .btn-back:active { background: #e2e8f0; }
        
        .clue-box { background: #fafcff; padding: 30px; border-radius: 20px; margin-bottom: 35px; font-size: 24px; line-height: 1.6; border: 2px solid #e2e8f0; }
        
        .code-display-wrapper { margin: 0 auto 20px auto; max-width: 320px; }
        .code-display {
            font-size: 38px; font-weight: 700; letter-spacing: 12px; width: 100%; padding: 15px; text-align: center;
            border: 3px solid var(--scout-indigo); border-radius: 16px; background: #ffffff; color: var(--scout-indigo);
            box-sizing: border-box; caret-color: transparent;
        }
        
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 320px; margin: 0 auto; }
        .key {
            background: #e2e8f0; border: none; border-radius: 16px; font-size: 32px; font-weight: 700; padding: 22px 0;
            color: var(--scout-indigo); display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: var(--scout-indigo); color: white; }
        .key.clear-key { background: #cbd5e1; font-size: 18px; text-transform: uppercase; }
        .key.submit-key { background: var(--scout-orange); color: white; font-size: 18px; text-transform: uppercase; }
        .key.submit-key:active { background: #943f00; }
        .error-banner { color: #ef4444; font-weight: 700; margin-top: 15px; font-size: 18px; min-height: 28px; text-align: center; }
        video { width: 100%; border-radius: 14px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="main-card" class="container">
    
    <div id="patrol-selection">
        <h1>⚜️ Joey Scout Adventure Hub ⚜️</h1>
        <h3>Tap your patrol color to enter the game:</h3>
        <div id="patrol-buttons-container" class="patrol-grid">Loading patrols...</div>
    </div>

    <div id="hunt-interface" class="hidden">
        <div class="header-row">
            <h2 id="active-patrol-name" class="patrol-title"></h2>
            <button class="btn-back" onclick="goBack()">⬅ Change Team</button>
        </div>
        
        <div class="clue-box">
            <div id="clue-text">Loading instructions...</div>
        </div>

        <div id="input-zone">
            <div class="code-display-wrapper">
                <input type="text" id="code-display" class="code-display" readonly placeholder="----">
            </div>

            <div class="keypad-grid">
                <button class="key" onclick="pressNum('1')">1</button>
                <button class="key" onclick="pressNum('2')">2</button>
                <button class="key" onclick="pressNum('3')">3</button>
                <button class="key" onclick="pressNum('4')">4</button>
                <button class="key" onclick="pressNum('5')">5</button>
                <button class="key" onclick="pressNum('6')">6</button>
                <button class="key" onclick="pressNum('7')">7</button>
                <button class="key" onclick="pressNum('8')">8</button>
                <button class="key" onclick="pressNum('9')">9</button>
                <button class="key action-key clear-key" onclick="clearCode()">Clear</button>
                <button class="key" onclick="pressNum('0')">0</button>
                <button class="key action-key submit-key" onclick="submitCode()">Go</button>
            </div>
            <div id="error-msg" class="error-banner"></div>
        </div>
    </div>
</div>

<script>
    let currentPatrol = "";
    const mainCard = document.getElementById('main-card');
    const codeDisplay = document.getElementById('code-display');
    const errorMsg = document.getElementById('error-msg');

    function loadPatrolButtons() {
        fetch('/api/patrols')
            .then(res => res.json())
            .then(patrols => {
                const container = document.getElementById('patrol-buttons-container');
                container.innerHTML = patrols.map(p => {
                    // Match standard colors or lower case safe strings to set button classes
                    const colorLower = p.patrol_name.toLowerCase();
                    return `<button class="btn-patrol p-${colorLower}" onclick="selectPatrol('${p.patrol_name}')">${p.patrol_name}</button>`;
                }).join('');
            });
    }

    function selectPatrol(patrol) {
        currentPatrol = patrol;
        
        // Remove old theme bindings
        mainCard.className = "container";
        
        // Apply active color wrapper framework layout theme rules
        const colorLower = patrol.toLowerCase();
        mainCard.classList.add(`theme-${colorLower}`, 'active-frame');
        
        document.getElementById('patrol-selection').classList.add('hidden');
        document.getElementById('hunt-interface').classList.remove('hidden');
        document.getElementById('active-patrol-name').innerText = patrol + " Patrol";
        clearCode();
        fetchClue();
    }

    function goBack() {
        mainCard.className = "container"; // Strip color frame boundaries 
        document.getElementById('patrol-selection').classList.remove('hidden');
        document.getElementById('hunt-interface').classList.add('hidden');
        loadPatrolButtons();
    }

    function fetchClue() {
        fetch(`/api/clue/${currentPatrol}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('clue-text').innerHTML = data.clue;
                if (data.isFinished) {
                    document.getElementById('input-zone').classList.add('hidden');
                } else {
                    document.getElementById('input-zone').classList.remove('hidden');
                }
            });
    }

    function pressNum(num) {
        errorMsg.innerText = "";
        if (codeDisplay.value.length < 4) codeDisplay.value += num;
    }

    function clearCode() { codeDisplay.value = ""; errorMsg.innerText = ""; }

    function submitCode() {
        if (codeDisplay.value.length === 0) return;
        
        fetch('/api/submit-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patrol: currentPatrol, code: codeDisplay.value })
        })
        .then(res => res.json())
        .then(data => {
            if (data.correct) {
                clearCode();
                fetchClue();
            } else {
                errorMsg.innerText = data.message || "Incorrect code!";
                codeDisplay.style.borderColor = "#ef4444";
                setTimeout(() => { codeDisplay.style.borderColor = "var(--scout-indigo)"; }, 500);
            }
        });
    }

    loadPatrolButtons();
</script>
</body>
</html>

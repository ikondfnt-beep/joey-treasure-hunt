<div class="container">
    <h1>⚜️ Joey Treasure Hunt ⚜️</h1>
    
    <!-- Step 1: Select Patrol (Populated dynamically) -->
    <div id="patrol-selection">
        <h3>Pick Your Patrol:</h3>
        <div id="patrol-buttons-container">Loading patrols...</div>
    </div>

    <!-- Step 2: The Main Dashboard -->
    <div id="hunt-interface" class="hidden">
        <h2 id="active-patrol-name"></h2>
        <button onclick="goBack()" style="background:#ccc; font-size:12px; padding:5px 10px;">Change Patrol</button>
        
        <div class="clue-box">
            <strong>Current Clue:</strong>
            <p id="clue-text">Loading...</p>
        </div>

        <div id="input-zone" style="margin-top: 20px;">
            <h3>Found a code? Enter it here:</h3>
            <input type="number" id="code-input" pattern="\d*" placeholder="0000" inputmode="numeric">
            <button class="btn-submit" onclick="submitCode()">Unlock Next Clue 🔓</button>
            <p id="error-msg" class="error"></p>
        </div>
    </div>
</div>

<script>
    let currentPatrol = "";

    // Fetch and display whatever patrols exist in our SQLite database
    function loadPatrolButtons() {
        fetch('/api/patrols')
            .then(res => res.json())
            .then(patrols => {
                const container = document.getElementById('patrol-buttons-container');
                if(patrols.length === 0) {
                    container.innerHTML = "<p>No patrols configured. Visit the /admin page to add some!</p>";
                    return;
                }
                container.innerHTML = patrols.map(p => `
                    <button class="btn-patrol" onclick="selectPatrol('${p.patrol_name}')">${p.patrol_name}</button>
                `).join('');
            });
    }

    function selectPatrol(patrol) {
        currentPatrol = patrol;
        document.getElementById('patrol-selection').classList.add('hidden');
        document.getElementById('hunt-interface').classList.remove('hidden');
        document.getElementById('active-patrol-name').innerText = patrol + " Patrol";
        fetchClue();
    }

    function goBack() {
        document.getElementById('patrol-selection').classList.remove('hidden');
        document.getElementById('hunt-interface').classList.add('hidden');
        loadPatrolButtons(); // refresh list
    }

    function fetchClue() {
        fetch(`/api/clue/${currentPatrol}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('clue-text').innerHTML = data.clue;
                if (data.isFinished) {
                    document.getElementById('input-zone').classList.add('hidden');
                } else {
                    document.getElementById('input-zone').classList.remove('hidden');
                }
            });
    }

    function submitCode() {
        const codeInput = document.getElementById('code-input');
        const errorMsg = document.getElementById('error-msg');
        
        fetch('/api/submit-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patrol: currentPatrol, code: codeInput.value })
        })
        .then(res => res.json())
        .then(data => {
            if (data.correct) {
                errorMsg.innerText = "";
                codeInput.value = "";
                fetchClue();
            } else {
                errorMsg.innerText = data.message || "That's not quite right. Try again!";
            }
        });
    }

    // Initialize list on startup
    loadPatrolButtons();
</script>

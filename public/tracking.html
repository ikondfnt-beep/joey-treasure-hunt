<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Hunt - TV Operations Radar</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* TV Display Optimized Styling */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 16px;
        }

        .tracking-layout { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
        }

        .tv-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* TV Page Header */
        .tv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            padding-bottom: 12px;
            margin-bottom: 4px;
        }
        
        .tv-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.025em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Patrol Race Cards */
        .patrol-race-card {
            background: #0f172a;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 12px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .patrol-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .patrol-name-tag {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 13px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge.active {
            background: #b34d00;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(179, 77, 0, 0.6);
            animation: pulse-tv 2s infinite;
        }

        .status-badge.complete {
            background: #166534;
            color: #bbf7d0;
        }

        .status-badge.start {
            background: #334155;
            color: #cbd5e1;
        }

        /* Progress Track Bars */
        .tv-progress-bg {
            background: #1e293b;
            border-radius: 10px;
            height: 16px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .tv-progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Checkpoint Step Nodes Bar */
        .step-nodes-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .step-node-box {
            flex: 1;
            padding: 6px 4px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
        }

        .step-node-box.active {
            background: #2e295e;
            color: #ffffff;
            border-color: #b34d00;
            box-shadow: 0 0 10px rgba(179, 77, 0, 0.4);
        }

        .step-node-box.done {
            background: #064e3b;
            color: #a7f3d0;
            border-color: #059669;
        }

        /* 🟢 DYNAMIC SIDE-BY-SIDE SPLIT TIMES GRID */
        .splits-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
            margin-top: 12px;
        }

        .patrol-splits-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 14px;
        }

        .splits-header {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .splits-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .split-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 8px;
            background: #1e293b;
            border-radius: 4px;
            border-left: 3px solid #475569;
        }

        .split-item.active-step {
            border-left-color: #f97316;
            background: #281d18;
        }

        .split-item.done-step {
            border-left-color: #22c55e;
        }

        /* TV Mode Toggle Controls */
        .tv-toggle-btn {
            background: #2e295e;
            color: #ffffff;
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        @keyframes pulse-tv {
            0% { box-shadow: 0 0 0 0 rgba(179, 77, 0, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(179, 77, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(179, 77, 0, 0); }
        }

        /* Fullscreen Mode Override */
        body.tv-fullscreen-mode .global-nav {
            display: none !important;
        }
        body.tv-fullscreen-mode {
            padding: 10px;
        }
    </style>
</head>
<body>

<!-- GLOBAL NAVIGATION -->
<nav class="global-nav">
    <div class="nav-brand">⚜️ Treasure Hunt Portal</div>
    <div class="nav-links">
        <a href="/" class="nav-link">Hunt Hub</a>
        <a href="/tracking" class="nav-link active">Live Tracking</a>
        <a href="/admin" class="nav-link">Command Centre</a>
        <a href="/instructions.html" class="nav-link">Instructions</a>
    </div>
</nav>

<div class="tracking-layout">
    
    <div class="tv-header">
        <h1 class="tv-title" id="tv-game-title">📡 LIVE RACE RADAR</h1>
        <div>
            <button type="button" class="tv-toggle-btn" onclick="toggleTVMode()">📺 Toggle TV Fullscreen</button>
        </div>
    </div>

    <!-- 1. LIVE PATROL RACE RADAR -->
    <div class="tv-card">
        <h2 style="color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin: 0;">🏁 Active Patrol Positions</h2>
        <div id="live-tracks-container" style="margin-top: 12px;">Loading live tracking coordinates...</div>
    </div>

    <!-- 2. SIDE-BY-SIDE SPLIT TIMES GRID -->
    <div class="tv-card">
        <h2 style="color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin: 0;">⏱️ Patrol Station Split Times</h2>
        <div id="duration-stats-container">
            <p style="color: #64748b; font-style: italic; margin-top: 8px;">Waiting for patrols to log station times...</p>
        </div>
    </div>
</div>

<script>
    let loadedClues = [];

    function fetchUpdates() {
        fetch('/api/admin/games')
            .then(res => res.json())
            .then(gameData => {
                const activeObj = gameData.games.find(g => g.game_id === gameData.active_game);
                if (activeObj && activeObj.game_title) {
                    document.getElementById('tv-game-title').innerText = `📡 LIVE RADAR: ${activeObj.game_title.toUpperCase()}`;
                }
                return fetch('/api/admin/clues');
            })
            .then(res => res.json())
            .then(cluesData => {
                loadedClues = cluesData;
                return fetch('/api/patrols');
            })
            .then(res => res.json())
            .then(patrolsData => {
                buildTVRadar(patrolsData, loadedClues);
                return fetch('/api/admin/durations');
            })
            .then(res => res.json())
            .then(durationData => {
                renderTVSplitsGrid(durationData, patrolsData);
            })
            .catch(err => console.error("Error fetching live tracking data:", err));
    }

    function buildTVRadar(patrols, clues) {
        const container = document.getElementById('live-tracks-container');
        const totalClues = clues.length;

        if (totalClues === 0 || patrols.length === 0) {
            container.innerHTML = "<p style='color: #64748b; font-style: italic;'>No active patrols or clues configured for this game.</p>";
            return;
        }

        container.innerHTML = patrols.map((p) => {
            const completedSteps = Math.max(0, p.current_step - 1);
            const isFinished = p.current_step > totalClues;
            const progressPercent = isFinished ? 100 : (totalClues > 0 ? Math.min(100, Math.round((completedSteps / totalClues) * 100)) : 0);

            let statusText = "Ready at Base";
            let statusClass = "status-badge start";
            
            if (isFinished) {
                statusText = "FINISHED! 🏆";
                statusClass = "status-badge complete";
            } else if (p.current_step > 0) {
                statusText = `Checkpoint ${completedSteps + 1} of ${totalClues}`;
                statusClass = "status-badge active";
            }

            let stepNodesHtml = '';
            
            let startNodeClass = "step-node-box";
            if (p.current_step === 0) startNodeClass += " active";
            if (p.current_step > 0) startNodeClass += " done";
            stepNodesHtml += `<div class="${startNodeClass}">Start 🚀</div>`;

            for (let i = 1; i <= totalClues; i++) {
                let nodeClass = "step-node-box";
                if (p.current_step === i) nodeClass += " active";
                if (p.current_step > i) nodeClass += " done";

                stepNodesHtml += `<div class="${nodeClass}">Station ${i}</div>`;
            }

            let finishNodeClass = "step-node-box";
            if (isFinished) finishNodeClass += " done active";
            stepNodesHtml += `<div class="${finishNodeClass}">Finish 🏆</div>`;

            return `
                <div class="patrol-race-card" style="border-left: 6px solid ${p.patrol_color};">
                    <div class="patrol-meta">
                        <div class="patrol-name-tag" style="color: ${p.patrol_color};">
                            <span>●</span> ${escapeHtml(p.patrol_name)} Patrol
                        </div>
                        <div class="${statusClass}">${statusText}</div>
                    </div>

                    <div class="tv-progress-bg">
                        <div class="tv-progress-fill" style="width: ${progressPercent}%; background-color: ${p.patrol_color};"></div>
                    </div>

                    <div class="step-nodes-row">${stepNodesHtml}</div>
                </div>
            `;
        }).join('');
    }

    // 🟢 NEW: SIDE-BY-SIDE PATROL SPLIT CARDS GRID
    function renderTVSplitsGrid(logs, patrols) {
        const container = document.getElementById('duration-stats-container');
        if (!logs || logs.length === 0) {
            container.innerHTML = "<p style='color: #64748b; font-style: italic; margin-top: 8px;'>Waiting for patrols to launch and log station times...</p>";
            return;
        }

        const groups = {};
        logs.forEach(log => {
            if (!groups[log.patrol_name]) groups[log.patrol_name] = [];
            groups[log.patrol_name].push(log);
        });

        let gridHtml = '<div class="splits-grid-container">';

        for (const patrol in groups) {
            const patrolObj = patrols.find(p => p.patrol_name === patrol);
            const patrolColor = patrolObj ? patrolObj.patrol_color : '#38bdf8';

            let itemsHtml = groups[patrol].map(log => {
                let durationText = 'Solving... ⏳';
                let itemClass = 'split-item active-step';

                if (log.end_time) {
                    const secondsDiff = Math.floor((log.end_time - log.start_time) / 1000);
                    const mins = Math.floor(secondsDiff / 60);
                    const secs = secondsDiff % 60;
                    durationText = `${mins}m ${secs}s ✓`;
                    itemClass = 'split-item done-step';
                }

                return `
                    <div class="${itemClass}">
                        <span>Station ${log.step_number}</span>
                        <b>${durationText}</b>
                    </div>
                `;
            }).join('');

            gridHtml += `
                <div class="patrol-splits-card" style="border-top: 3px solid ${patrolColor};">
                    <div class="splits-header" style="color: ${patrolColor};">
                        <span>● ${escapeHtml(patrol)} Patrol</span>
                    </div>
                    <div class="splits-list">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        }

        gridHtml += '</div>';
        container.innerHTML = gridHtml;
    }

    function toggleTVMode() {
        document.body.classList.toggle('tv-fullscreen-mode');
        if (document.body.classList.contains('tv-fullscreen-mode')) {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    fetchUpdates();
    setInterval(fetchUpdates, 4000);
</script>
</body>
</html>

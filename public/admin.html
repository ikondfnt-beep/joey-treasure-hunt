<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunt Management Panel</title>
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .admin-layout { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            gap: 30px; 
        }
        
        .col-main { flex: 2; }
        .col-side { flex: 1; }
        .box { max-width: 100%; margin: 0 0 30px 0; }
        
        label { display: block; margin: 15px 0 6px; font-weight: 600; color: #475569; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 16px; 
            background: #ffffff;
        }
        
        input:focus, textarea:focus { 
            border-color: var(--scout-indigo); 
            outline: none; 
        }
        
        textarea { height: 100px; font-family: monospace; }
        
        .btn-action { 
            background: var(--scout-orange); 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            font-weight: 700; 
            border-radius: 10px; 
            font-size: 16px; 
            width: 100%; 
            margin-top: 15px; 
        }
        
        .btn-reset { 
            background: #dc2626; 
            padding: 10px 16px; 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: 600; 
            float: right; 
            margin-bottom: 10px; 
        }
        
        .btn-delete { 
            background: #ef4444; 
            border: none; 
            color: white; 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
        }
        
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: var(--scout-indigo); font-weight: 700; }
        
        .patrol-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border-bottom: 1px solid #e2e8f0; 
        }
    </style>
</head>
<body>

<div class="admin-layout">
    <div class="col-main">
        <div class="box">
            <h2>🛠️ Manage Hunt Challenges</h2>
            <form id="clue-form">
                <label>Step Number (Sequential: 1, 2, 3...)</label>
                <input type="number" id="step_number" required placeholder="e.g. 1">

                <label>4-Digit Unlock Code</label>
                <input type="text" id="unlock_code" required maxlength="4" placeholder="e.g. 1234">

                <label>Clue Display Content (HTML allowed - text, links, or video tags)</label>
                <textarea id="clue_html" required placeholder="Look under the water tank outside!"></textarea>

                <button type="submit" class="btn-action">Save / Update Task</button>
            </form>
        </div>

        <div class="box">
            <button class="btn-reset" onclick="resetGame()">Reset Game Progress 🔁</button>
            <h2>🏃 Active Challenges Map</h2>
            <table>
                <thead>
                    <tr>
                        <th>Step</th>
                        <th>Code Required</th>
                        <th>Reveals Clue Content</th>
                    </tr>
                </thead>
                <tbody id="clues-list"></tbody>
            </table>
        </div>
    </div>

    <div class="col-side">
        <div class="box">
            <h2>⛺ Manage Patrols</h2>
            <form id="patrol-form">
                <label>Add New Patrol Name</label>
                <input type="text" id="patrol_name" required placeholder="e.g. Bilby">
                <button type="submit" class="btn-action" style="background: var(--scout-indigo);">Add Patrol</button>
            </form>

            <h3 style="margin-top: 30px; text-align: left; color: var(--scout-indigo); border-bottom: 2px solid #f1f5f9; padding-bottom: 5px;">Configured Patrols</h3>
            <div id="patrols-list-container"></div>
        </div>
    </div>
</div>

<script>
    function loadData() {
        // Load Clues map layout
        fetch('/api/admin/clues')
            .then(res => res.json())
            .then(data => {
                document.getElementById('clues-list').innerHTML = data.map(c => `
                    <tr>
                        <td><b>Step ${c.step_number}</b></td>
                        <td><code>${c.unlock_code}</code></td>
                        <td>${c.clue_html}</td>
                    </tr>
                `).join('');
            });

        // Load Patrols list map
        fetch('/api/patrols')
            .then(res => res.json())
            .then(data => {
                document.getElementById('patrols-list-container').innerHTML = data.map(p => `
                    <div class="patrol-item">
                        <span>🌲 <b>${p.patrol_name}</b> (Step: ${p.current_step})</span>
                        <button class="btn-delete" onclick="deletePatrol('${p.patrol_name}')">X</button>
                    </div>
                `).join('');
            });
    }

    document.getElementById('clue-form').addEventListener('submit', (e) => {
        e.preventDefault();
        fetch('/api/admin/clues', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                step_number: document.getElementById('step_number').value,
                unlock_code: document.getElementById('unlock_code').value,
                clue_html: document.getElementById('clue_html').value
            })
        }).then(() => { 
            document.getElementById('clue-form').reset(); 
            loadData(); 
        });
    });

    document.getElementById('patrol-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const input = document.getElementById('patrol_name');
        fetch('/api/admin/patrols', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ patrol_name: input.value })
        }).then(() => { 
            input.value = ''; 
            loadData(); 
        });
    });

    function deletePatrol(name) {
        if(confirm(`Remove ${name} Patrol?`)) {
            fetch(`/api/admin/patrols/${encodeURIComponent(name)}`, { method: 'DELETE' })
                .then(() => loadData());
        }
    }

    function resetGame() {
        if(confirm("Reset all patrol steps back to 0?")) {
            fetch('/api/admin/reset-patrols', { method: 'POST' })
                .then(res => res.json())
                .then(data => { 
                    alert(data.message); 
                    loadData(); 
                });
        }
    }

    // Run initial data population
    loadData();
</script>
</body>
</html>

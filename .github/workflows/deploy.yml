steps:
      # Step 1: Clone the fresh code
      - name: Checkout repository files
        uses: actions/checkout@v4

      # Step 2: Pull fresh code files to the production folder
      - name: Pull fresh code files to application folder
        run: |
          cd /home/wallanwallan/joey-treasure-hunt
          git fetch origin main
          git reset --hard origin/main

      # Step 3: Rebuild using sudo (authorized by visudo)
      - name: Rebuild application container layers
        run: |
          cd /home/wallanwallan/joey-treasure-hunt
          echo "📦 Compiling clean production Docker images..."
          sudo docker build --no-cache -t joey-hunt .

      # Step 4: Run your script using sudo (authorized by visudo)
      - name: Recycle active containers
        run: |
          cd /home/wallanwallan/joey-treasure-hunt
          echo "🔄 Rolling live deployment changes online..."
          sudo ./update-hunt.sh